[metadata]
name        = Example Module
version     = 1.0.0
author      = Rafli (Fli)
description = BetterBot Framework demonstration module. Shows how to create commands, use shared_data, and hook into events.

[commands]
; Comma-separated list of command triggers. The prefix (. or /) must be included.
triggers = .hello, .ping, /hello, /ping, .info, /info

[dependencies]
; List of pip packages required by this module.
; Leave empty if there are no external dependencies.
; pip_packages =

[settings]
enabled = true
