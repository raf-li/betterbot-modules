[metadata]
name        = Example Module
version     = 1.0.0
author      = Rafli (Fli)
description = BetterBot Framework demonstration module. Shows how to create commands, use shared_data, and hook into events.

[commands]
; Bare command names only — NO prefix needed here.
; The bot will automatically prepend all configured prefixes (e.g. . and /)
; from config.json's "command_prefix" setting.
; Example: "hello" → users can type .hello OR /hello (or any other configured prefix).
triggers = hello, ping, info, count, setup, timer

[dependencies]
; List of pip packages required by this module.
; Leave empty if there are no external dependencies.
; pip_packages =

[settings]
enabled = true
