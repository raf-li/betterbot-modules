[metadata]
name        = Ticket Support
version     = 1.1.0
author      = Rafli (Fli)
description = Full-featured support ticket system with SMTP email notifications. Configure via Web Dashboard.

[commands]
; Bare command names only — NO prefix needed here.
; The bot will automatically prepend all configured prefixes (e.g. . and /)
; so users can type .ticket OR /ticket (or any future prefix).
triggers = ticket

[dependencies]
min_core_version = 1.0.0

[settings]
enabled = true